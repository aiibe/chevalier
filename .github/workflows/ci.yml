name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Core tests
        run: deno test -A

      # templates.gen.ts is committed but generated from init/templates/; fail if
      # someone edited a template without regenerating (deno task gen).
      - name: Init templates up to date
        run: deno task --config init/deno.json gen:check

      # Scaffolds a fresh app, repoints it at the local core (the code in this
      # PR, not the registry), and asserts dev + build work.
      - name: Init scaffold smoke test
        run: deno task --config init/deno.json smoke

  # Smoke-tests a scaffold against the *published* @chevalier/core. Skips PRs: a
  # PR may bump the version pin before that version is on JSR.
  smoke-published:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Init scaffold smoke test (published core)
        env:
          SMOKE_JSR: "1"
        run: deno run -A init/scripts/smoke.ts
